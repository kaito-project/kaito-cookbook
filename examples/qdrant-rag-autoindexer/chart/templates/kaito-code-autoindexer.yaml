{{- if and .Values.autoindexer.enabled .Values.autoindexer.codeIndexer.enabled }}
apiVersion: autoindexer.kaito.sh/v1alpha1
kind: AutoIndexer
metadata:
  name: {{ .Values.autoindexer.codeIndexer.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "qdrant-rag.labels" . | nindent 4 }}
    component: code-autoindexer
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  dataSource:
    type: Git
    git:
      repository: {{ .Values.autoindexer.codeIndexer.dataSource.git.repository }}
      branch: {{ .Values.autoindexer.codeIndexer.dataSource.git.branch }}
      paths:
        {{- range .Values.autoindexer.codeIndexer.dataSource.git.paths }}
        - {{ . | quote }}
        {{- end }}
  driftRemediationPolicy:
    strategy: {{ .Values.autoindexer.codeIndexer.driftRemediationPolicy.strategy }}
  indexName: {{ .Values.autoindexer.codeIndexer.indexName }}
  ragEngine: {{ .Values.ragengine.name }}
{{- end }}