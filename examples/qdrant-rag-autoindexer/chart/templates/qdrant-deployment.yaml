{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qdrant-rag.fullname" . }}-qdrant
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "qdrant-rag.labels" . | nindent 4 }}
    component: qdrant
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      {{- include "qdrant-rag.selectorLabels" . | nindent 6 }}
      component: qdrant
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "qdrant-rag.selectorLabels" . | nindent 8 }}
        component: qdrant
    spec:
      containers:
      - name: qdrant
        image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
        imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.qdrant.service.httpPort }}
          name: http
          protocol: TCP
        - containerPort: {{ .Values.qdrant.service.grpcPort }}
          name: grpc
          protocol: TCP
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /livez
            port: {{ .Values.qdrant.service.httpPort }}
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: {{ .Values.qdrant.service.httpPort }}
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          {{- toYaml .Values.qdrant.resources | nindent 10 }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        {{- if .Values.qdrant.persistence.enabled }}
        volumeMounts:
        - mountPath: /qdrant/storage
          name: qdrant-data
        {{- end }}
      dnsPolicy: ClusterFirst
      {{- if .Values.qdrant.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.qdrant.nodeSelector | nindent 8 }}
      {{- end }}
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      {{- if .Values.qdrant.persistence.enabled }}
      volumes:
      - name: qdrant-data
        persistentVolumeClaim:
          claimName: {{ include "qdrant-rag.fullname" . }}-qdrant-storage
      {{- end }}
{{- end }}