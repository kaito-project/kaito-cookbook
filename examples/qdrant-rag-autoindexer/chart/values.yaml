# Default values for qdrant-rag chart
# This is a YAML-formatted file.

# Global settings
nameOverride: ""
fullnameOverride: ""
namespace: default

# Qdrant configuration
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: v1.13.4
    pullPolicy: IfNotPresent
  
  # Resource configuration for CPU deployments
  resources:
    requests:
      cpu: "8"
      memory: "32Gi"
    limits:
      cpu: "14"
      memory: "56Gi"
  
  # Node selector for dedicated Qdrant nodes
  nodeSelector:
    workload: qdrant
  
  # Service configuration
  service:
    type: ClusterIP
    httpPort: 6333
    grpcPort: 6334
  
  # Persistent volume configuration
  persistence:
    enabled: true
    size: 30Gi
    storageClass: default
    accessMode: ReadWriteOnce

# RAGEngine configuration
ragengine:
  enabled: true
  name: ragengine
  
  # Compute configuration for CPU deployments
  compute:
    count: 1
    instanceType: "Standard_D8_v3"  # CPU instance type
    labelSelector:
      workload: ragengine
  
  # Embedding configuration
  embedding:
    local:
      modelID: "BAAI/bge-small-en-v1.5"
  
  # Inference service configuration
  inferenceService:
    contextWindowSize: 4096
  
  # Storage configuration pointing to Qdrant
  storage:
    vectorDB:
      engine: qdrant
      # URL template - will be resolved to actual service URL

# AutoIndexer configuration
autoindexer:
  enabled: true
  
  # Code AutoIndexer configuration
  codeIndexer:
    enabled: true
    name: kaito-code-autoindexer
    indexName: kaito-codebase
    dataSource:
      git:
        repository: https://github.com/kaito-project/kaito.git
        branch: main
        paths:
          - '*.go'
          - '*.py'
          - '*.yaml'
    driftRemediationPolicy:
      strategy: Manual
  
  # Documentation AutoIndexer configuration
  docsIndexer:
    enabled: true
    name: kaito-docs-autoindexer
    indexName: kaito-docs
    dataSource:
      git:
        repository: https://github.com/kaito-project/kaito.git
        branch: main
        paths:
          - '*.md'
    driftRemediationPolicy:
      strategy: Manual