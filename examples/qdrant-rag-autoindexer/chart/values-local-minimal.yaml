# Minimal values for local development/testing
# This configuration is for smaller resource requirements

# Global settings
namespace: default

# Qdrant configuration with reduced resources for local testing
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: v1.13.4
    pullPolicy: IfNotPresent
  
  # Reduced resource configuration for local testing
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "8Gi"
  
  # Remove node selector for local testing
  nodeSelector: {}
  
  service:
    type: ClusterIP
    httpPort: 6333
    grpcPort: 6334
  
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # Use default storage class
    accessMode: ReadWriteOnce

# RAGEngine configuration for local testing
ragengine:
  enabled: true
  name: ragengine
  
  # Minimal compute configuration
  compute:
    count: 1
    instanceType: "Standard_D8_v3"  # Match existing node type
    # Remove labelSelector for auto-provisioning in local environments
    labelSelector:
      workload: ragengine
  
  embedding:
    local:
      modelID: "BAAI/bge-small-en-v1.5"
  
  inferenceService:
    contextWindowSize: 2048  # Reduced context window for local testing
  
  storage:
    vectorDB:
      engine: qdrant

# AutoIndexer configuration
autoindexer:
  enabled: true
  
  # Code AutoIndexer with smaller repository for faster testing
  codeIndexer:
    enabled: true
    name: kaito-code-autoindexer
    indexName: kaito-codebase
    dataSource:
      git:
        repository: https://github.com/kaito-project/kaito.git
        branch: main
        paths:
          - '*.yaml'
          - '*.md'
    driftRemediationPolicy:
      strategy: Manual
  
  # Disable docs indexer for minimal setup
  docsIndexer:
    enabled: false